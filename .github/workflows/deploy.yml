name: Deploy to Vercel

on:
  push:
    branches: [main]

# Cancel previous runs of this workflow on the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web app
        run: pnpm --filter @ever-works/web-minimal build
        env:
          DATA_REPOSITORY: ${{ secrets.DATA_REPOSITORY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_BRANCH: ${{ secrets.GITHUB_BRANCH || 'main' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://example.com' }}

      - name: Build sample-basic
        run: pnpm --filter @ever-works/sample-basic build
        env:
          SITE_URL: https://react-components.example.com

      # Vercel CLI deployment (when configured)
