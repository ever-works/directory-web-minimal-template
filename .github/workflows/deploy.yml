name: Pre-deploy Build Verification

# Historically this file was a half-finished Vercel deploy workflow (Vercel
# CLI steps commented out, no `workflow_dispatch`, no env wiring). Per the
# "do not remove, only improve" rule (CLAUDE.md / AGENTS.md R13), it has
# been repurposed into a pre-deploy build sanity check instead of deleted.
#
# The real Vercel deployment is now in `deploy_vercel.yaml` (dispatched by
# the Ever Works platform) and `deploy_prod.yaml` (triggered on push to
# main). This workflow stays as a fast-fail check: it verifies that
# `pnpm build:web` succeeds with the public env vars before the real
# deploy job spins up Vercel.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Verify build:web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web app
        run: pnpm build:web
        env:
          # Build sanity check — data sync is best-effort. If DATA_REPOSITORY
          # secret is unset the pages render empty but the build still
          # succeeds, which is exactly what we want for "did this commit
          # break the build?" signal.
          DATA_REPOSITORY: ${{ secrets.DATA_REPOSITORY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_BRANCH: ${{ secrets.GITHUB_BRANCH || 'main' }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://example.com' }}
