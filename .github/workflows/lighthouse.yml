name: Lighthouse CI

# Performance audit (Lighthouse CI against a sample-basic build).
#
# Scope: only the release branches stage / main. PR and develop triggers
# were removed in 2026-05-27 (see
# Workspace/knowledge/runbooks/CI_RELEASE_GATES.md) — building
# sample-basic + running a full Lighthouse audit on every PR was burning
# CI minutes; gating to stage/main aligns with the broader release-gate
# policy where heavy jobs only run on merges to release branches.

on:
  push:
    branches: [stage, main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Performance Audit
    runs-on: ${{ vars.RUNNER_LINUX_X64_4 || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sample-basic
        run: pnpm --filter @ever-works/sample-basic build
        env:
          SITE_URL: https://react-components.example.com

      - name: Run Lighthouse CI
        # Lighthouse runs against an empty-content build of sample-basic in
        # CI (samples' `.content/` is gitignored — pulled at runtime). The
        # build still produces a homepage and a `/categories/` page, but any
        # dynamic-route URL (e.g. `/item/<slug>/`) 404s, which `lhci collect`
        # treats as a fatal `ERRORED_DOCUMENT_REQUEST`. The lighthouserc.cjs
        # URL list is already trimmed to safe entries; this `continue-on-error`
        # is the second-line defence so a future Astro/Lighthouse runtime
        # change that makes even the homepage flaky does NOT block PR merges.
        # Lighthouse is a *warning*-tier signal here — assertions in
        # `lighthouserc.cjs` use `['warn', ...]`, never `['error', ...]`.
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.cjs
          uploadArtifacts: true
          runs: 3
          # NOTE: The preview server is started by `lhci collect` itself via
          # the `startServerCommand` / `startServerReadyPattern` keys in
          # `lighthouserc.cjs`. The action's previous `serverCommand` /
          # `serverReadyPattern` inputs are NOT supported by v12 and were
          # silently dropped (run 25599075547 emitted
          # `##[warning]Unexpected input(s) 'serverCommand', 'serverReadyPattern'`).
          # Without a started server Chrome rendered the
          # chrome-error://chromewebdata/ interstitial on every URL.
