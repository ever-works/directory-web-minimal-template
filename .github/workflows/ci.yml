name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build without data repo — pages will be empty but build should succeed
          SITE_URL: https://example.com

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sample-basic
        run: pnpm --filter @ever-works/sample-basic build
        env:
          SITE_URL: https://react-components.example.com

      - name: Build sample-jobs
        run: pnpm --filter @ever-works/sample-jobs build
        env:
          SITE_URL: https://remote-tech-jobs.example.com

      - name: Build sample-events
        run: pnpm --filter @ever-works/sample-events build
        env:
          SITE_URL: https://tech-events.example.com

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web-e2e

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: apps/web-e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web-e2e/playwright-report/
          retention-days: 7
